<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — El Rincón de Alma</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
  body { background: var(--surface); min-height: 100vh; }

  /* LOGIN */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .login-card {
    width: 100%; max-width: 360px;
    background: var(--white); border-radius: 20px;
    border: 0.5px solid var(--border); padding: 2.5rem 2rem; text-align: center;
  }
  .login-logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--gold); margin-bottom: 4px; }
  .login-sub  { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 2rem; }
  .field { margin-bottom: 1rem; text-align: left; }
  .field label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 11px 14px;
    border: 0.5px solid var(--border); border-radius: 10px;
    font-size: 15px; font-family: 'DM Sans', sans-serif;
    background: var(--surface); outline: none; transition: border .2s;
  }
  .field input:focus { border-color: var(--gold); }
  .login-error { font-size: 12px; color: #A02020; margin-top: 10px; }

  /* DASHBOARD */
  .dash { display: none; max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .dash-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
  }
  .dash-logo { font-family: 'Playfair Display', serif; font-style: italic; font-size: 20px; color: var(--gold); }
  .dash-date { font-size: 12px; color: var(--muted); }
  .logout-btn {
    font-size: 12px; color: var(--muted); background: none;
    border: 0.5px solid var(--border); border-radius: 6px;
    padding: 6px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.75rem; }
  .stat  { background: var(--white); border-radius: 14px; border: 0.5px solid var(--border); padding: 1.25rem 1rem; text-align: center; }
  .stat-n { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--gold); line-height: 1; }
  .stat-l { font-size: 11px; color: var(--muted); margin-top: 6px; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title  { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .refresh-btn {
    font-size: 12px; color: var(--gold); background: none;
    border: 0.5px solid rgba(201,168,76,0.4); border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  .table-wrap { background: var(--white); border-radius: 14px; border: 0.5px solid var(--border); overflow: hidden; }
  .code-table { width: 100%; border-collapse: collapse; }
  .code-table th { text-align: left; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 10px 14px; border-bottom: 0.5px solid var(--border); }
  .code-table td { padding: 10px 14px; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .code-table tr:last-child td { border-bottom: none; }
  .code-table tbody tr:hover  { background: rgba(201,168,76,0.04); }
  .code-mono { font-family: monospace; font-size: 14px; font-weight: 600; letter-spacing: 2px; }

  .empty-state  { text-align: center; padding: 2.5rem; color: var(--muted); font-size: 14px; }
  .loading-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card fade-up">
    <div class="login-logo">El Rincón de Alma</div>
    <div class="login-sub">Área privada</div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="pwInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()" autofocus />
    </div>
    <button class="btn-gold" onclick="doLogin()">Entrar</button>
    <p class="login-error" id="loginErr"></p>
  </div>
</div>

<div class="dash" id="dash">
  <div class="dash-top">
    <div>
      <div class="dash-logo">El Rincón de Alma</div>
      <div class="dash-date" id="dashDate"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sair</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sScans">—</div><div class="stat-l">Scans hoje</div></div>
    <div class="stat"><div class="stat-n" id="sCodes">—</div><div class="stat-l">Códigos gerados</div></div>
    <div class="stat"><div class="stat-n" id="sUsed">—</div><div class="stat-l">Resgatados</div></div>
  </div>
  <div class="section-header">
    <div class="section-title">Códigos de hoje</div>
    <button class="refresh-btn" onclick="loadDash()">↻ Atualizar</button>
  </div>
  <div class="table-wrap">
    <div id="tableArea" class="loading-state">A carregar...</div>
  </div>
</div>

<script>
let currentPassword = "";

function doLogin() {
  const pw = document.getElementById("pwInput").value;
  if(!pw) return;
  currentPassword = pw;
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("dash").style.display = "block";
  document.getElementById("dashDate").textContent = new Date().toLocaleDateString("pt-PT", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
  loadDash();
}

function doLogout() {
  currentPassword = "";
  document.getElementById("loginWrap").style.display = "flex";
  document.getElementById("dash").style.display = "none";
  document.getElementById("pwInput").value = "";
  document.getElementById("loginErr").textContent = "";
}

async function loadDash() {
  document.getElementById("tableArea").innerHTML = '<div class="loading-state">A carregar...</div>';
  try {
    const res = await fetch(`/api/painel-dados?pw=${encodeURIComponent(currentPassword)}`);
    const data = await res.json();

    if(!data.success) {
      document.getElementById("loginErr").textContent = "Senha incorreta.";
      doLogout();
      return;
    }

    document.getElementById("sScans").textContent = data.total_scans;
    document.getElementById("sCodes").textContent = data.total_codigos;
    document.getElementById("sUsed").textContent  = data.resgatados;

    if(data.codigos.length === 0) {
      document.getElementById("tableArea").innerHTML = '<div class="empty-state">Nenhum código gerado hoje ainda.</div>';
      return;
    }

    const rows = data.codigos.map(c => `
      <tr>
        <td><span class="code-mono">${c.code}</span></td>
        <td>${c.gerado_as || "—"}</td>
        <td>${c.resgatado_as || "—"}</td>
        <td><span class="badge ${c.usado ? 'badge-used' : 'badge-active'}">${c.usado ? "Resgatado" : "Ativo"}</span></td>
      </tr>
    `).join("");

    document.getElementById("tableArea").innerHTML = `
      <table class="code-table">
        <thead><tr>
          <th>Código</th><th>Gerado às</th><th>Resgatado às</th><th>Estado</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch(e) {
    document.getElementById("tableArea").innerHTML = '<div class="empty-state">Erro ao carregar dados.</div>';
  }
}
</script>
</body>
</html>
